<!DOCTYPE html>
<html>
<head>
  <title>Guess the Number Game</title>
</head>
<body>
  <h2>Guess the Number (1–100)</h2>
  <input type="number" id="guessInput" placeholder="Enter your guess">
  <button onclick="checkGuess()">Submit Guess</button>
  <p id="message"></p>
  <p id="score"></p>

  <script>
    // Generate random number between 1 and 100
    let number = Math.floor(Math.random() * 100) + 1;
    let guesses = 0;
    let gameOver = false;

    function checkGuess() {
      if (gameOver) return;

      let guess = parseInt(document.getElementById("guessInput").value);
      guesses++;

      if (guess === number) {
        document.getElementById("message").innerText = "🎉 Correct! You guessed it!";
        document.getElementById("score").innerText = "Your score: " + (100 - guesses);
        gameOver = true;
      } else if (guess > number) {
        document.getElementById("message").innerText = "Too high! Try again.";
      } else {
        document.getElementById("message").innerText = "Too low! Try again.";
      }
    }
  </script>
</body>
</html>
